<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines }}{% else %}{{ site.description }}{% endif %}">
  <script>
    (function() {
      var savedTheme = null;
      try {
        savedTheme = localStorage.getItem("theme");
      } catch (e) {}
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = savedTheme || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    :root {
      --bg-top: #08111f;
      --bg-bottom: #13283f;
      --panel-bg: rgba(10, 18, 32, 0.48);
      --panel-border: rgba(255, 255, 255, 0.18);
      --reading-bg: rgba(7, 16, 30, 0.94);
      --reading-border: rgba(148, 196, 255, 0.16);
      --reading-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      --code-bg: #0a1628;
      --code-bg-top: #102036;
      --code-border: rgba(125, 176, 255, 0.18);
      --code-inline-bg: rgba(111, 167, 255, 0.12);
      --code-inline-border: rgba(111, 167, 255, 0.16);
      --code-text: #e8f2ff;
      --quote-bg: rgba(108, 170, 255, 0.08);
      --quote-border: rgba(115, 224, 255, 0.55);
      --table-stripe: rgba(255, 255, 255, 0.03);
      --text-main: #f4f7fb;
      --text-soft: rgba(244, 247, 251, 0.9);
      --text-faint: rgba(244, 247, 251, 0.74);
      --text-code-soft: #9db7d7;
      --accent: #73e0ff;
      --accent-strong: #b8fff6;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.38);
      --shadow-hover: 0 24px 56px rgba(0, 0, 0, 0.32);
      --radius-xl: 30px;
      --radius-lg: 24px;
    }

    :root[data-theme="light"] {
      --bg-top: #eef6ff;
      --bg-bottom: #dbe9fb;
      --panel-bg: rgba(255, 255, 255, 0.72);
      --panel-border: rgba(70, 111, 163, 0.14);
      --reading-bg: rgba(255, 255, 255, 0.94);
      --reading-border: rgba(111, 167, 255, 0.18);
      --reading-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.52);
      --code-bg: #e8f1fb;
      --code-bg-top: #f4f8fd;
      --code-border: rgba(111, 167, 255, 0.16);
      --code-inline-bg: rgba(111, 167, 255, 0.14);
      --code-inline-border: rgba(111, 167, 255, 0.14);
      --code-text: #24384d;
      --quote-bg: rgba(111, 167, 255, 0.08);
      --quote-border: rgba(84, 146, 235, 0.48);
      --table-stripe: rgba(111, 167, 255, 0.05);
      --text-main: #1f3147;
      --text-soft: rgba(31, 49, 71, 0.82);
      --text-faint: rgba(31, 49, 71, 0.62);
      --text-code-soft: #58718d;
      --accent: #2a7fff;
      --accent-strong: #0d9488;
      --shadow: 0 24px 60px rgba(54, 90, 138, 0.14);
      --shadow-hover: 0 18px 44px rgba(54, 90, 138, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(115, 224, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(184, 255, 246, 0.12), transparent 24%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    a {
      color: inherit;
    }

    #scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 88%);
    }

    .app-shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      gap: 24px;
      width: min(1400px, calc(100vw - 32px));
      margin: 16px auto;
      min-height: calc(100svh - 32px);
    }

    .profile-panel {
      position: sticky;
      top: 16px;
      align-self: start;
      height: calc(100svh - 32px);
    }

    .profile-card,
    .content-shell,
    .content-card,
    .content-header,
    .meta-bar,
    .post-item,
    .pagination,
    .post-nav,
    .comments-panel {
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(145%);
      -webkit-backdrop-filter: blur(22px) saturate(145%);
    }

    .profile-card {
      position: relative;
      height: 100%;
      padding: 22px;
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .profile-card__glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(115, 224, 255, 0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(184, 255, 246, 0.08), transparent 18%);
      pointer-events: none;
    }

    .profile-card__inner {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      height: 100%;
    }

    .profile-badge,
    .section-badge,
    .tag-chip {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: var(--accent-strong);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .profile-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .profile-hero {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    .profile-avatar {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .profile-name {
      margin: 14px 0 0;
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
      text-align: center;
    }

    .profile-subtitle,
    .profile-description,
    .content-subtitle,
    .content-intro,
    .post-excerpt {
      color: var(--text-soft);
      line-height: 1.75;
    }

    .profile-subtitle {
      margin: 10px 0 0;
      color: var(--accent-strong);
      text-align: center;
    }

    .profile-description,
    .content-subtitle,
    .content-intro {
      margin: 10px 0 0;
    }

    .profile-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .profile-action,
    .button-link,
    .pagination a,
    .pagination span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 11px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .profile-action:hover,
    .profile-action.is-active,
    .button-link:hover,
    .pagination a:hover,
    .pagination .is-current {
      transform: translateY(-2px);
      border-color: rgba(115, 224, 255, 0.4);
      background: rgba(115, 224, 255, 0.12);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.2);
    }

    .profile-action {
      width: 100%;
    }

    .theme-switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      flex: none;
    }

    .theme-switch__input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .theme-switch__track {
      position: relative;
      display: inline-flex;
      width: 60px;
      height: 34px;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .theme-switch__track::before {
      content: "☀️";
      position: absolute;
      left: 9px;
      top: 7px;
      font-size: 0.72rem;
      opacity: 0.85;
    }

    .theme-switch__track::after {
      content: "🌙";
      position: absolute;
      right: 8px;
      top: 7px;
      font-size: 0.72rem;
      opacity: 0.9;
    }

    .theme-switch__thumb {
      position: relative;
      z-index: 1;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffffff, #cfe0ff);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      transition: transform 180ms ease, background 180ms ease;
    }

    .theme-switch__input:checked + .theme-switch__track {
      border-color: rgba(115, 224, 255, 0.32);
      background: rgba(115, 224, 255, 0.14);
    }

    .theme-switch__input:checked + .theme-switch__track .theme-switch__thumb {
      transform: translateX(26px);
      background: linear-gradient(180deg, #f3fbff, #91d8ff);
    }

    .theme-switch__input:focus-visible + .theme-switch__track {
      outline: 2px solid rgba(115, 224, 255, 0.5);
      outline-offset: 2px;
    }

    .profile-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .info-pill {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      display: grid;
      gap: 8px;
    }

    .info-pill--location {
      border-color: rgba(115, 224, 255, 0.22);
      background: linear-gradient(180deg, rgba(20, 66, 98, 0.5), rgba(10, 28, 45, 0.62));
    }

    .info-pill--email {
      border-color: rgba(255, 183, 77, 0.22);
      background: linear-gradient(180deg, rgba(98, 61, 20, 0.5), rgba(46, 24, 10, 0.62));
    }

    .info-pill--posts {
      border-color: rgba(129, 199, 132, 0.22);
      background: linear-gradient(180deg, rgba(27, 86, 56, 0.5), rgba(12, 37, 27, 0.62));
    }

    .info-pill--categories {
      border-color: rgba(186, 104, 200, 0.22);
      background: linear-gradient(180deg, rgba(88, 35, 104, 0.5), rgba(34, 14, 44, 0.62));
    }

    .info-pill__label {
      color: var(--text-faint);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-pill__value {
      color: var(--text-main);
      font-size: 0.96rem;
      word-break: break-word;
    }

    .profile-footnote {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--text-faint);
      font-size: 0.92rem;
    }

    .profile-footnote a {
      text-decoration: none;
    }

    .profile-social-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-soft);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease;
    }

    .profile-social-link svg {
      width: 16px;
      height: 16px;
      flex: none;
    }

    .profile-social-link:hover {
      transform: translateY(-2px);
      border-color: rgba(115, 224, 255, 0.35);
      background: rgba(115, 224, 255, 0.1);
      color: #ffffff;
    }

    .content-shell {
      position: relative;
      padding: 18px;
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .content-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(115, 224, 255, 0.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(184, 255, 246, 0.08), transparent 20%);
      pointer-events: none;
    }

    .content-shell__inner {
      position: relative;
      display: grid;
      gap: 18px;
    }

    .content-header,
    .content-card,
    .pagination,
    .post-nav,
    .comments-panel {
      position: relative;
      padding: 22px;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .content-card.markdown-body {
      background: linear-gradient(180deg, rgba(10, 21, 37, 0.96), var(--reading-bg));
      border-color: var(--reading-border);
      box-shadow: var(--shadow), var(--reading-shadow);
    }

    .content-title {
      margin: 10px 0 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.04;
      letter-spacing: -0.05em;
    }

    .post-list {
      display: grid;
      gap: 18px;
    }

    .post-item {
      position: relative;
      padding: 22px;
      border-radius: 22px;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .post-item:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: var(--shadow-hover);
      border-color: rgba(115, 224, 255, 0.24);
      background: rgba(255, 255, 255, 0.06);
    }

    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      padding: 12px 14px;
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: none;
    }

    .meta-bar span,
    .meta-bar a {
      color: var(--text-faint);
      text-decoration: none;
      font-size: 0.92rem;
    }

    .post-item h2,
    .article-title {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2.05rem);
      line-height: 1.18;
      letter-spacing: -0.03em;
    }

    .post-item h2 a {
      text-decoration: none;
      color: var(--text-main);
    }

    .post-item h2 a:hover {
      color: var(--accent-strong);
    }

    .post-excerpt {
      margin: 14px 0 18px;
    }

    .post-item__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .pagination span {
      color: var(--text-faint);
    }

    .markdown-body {
      color: var(--text-main);
      line-height: 1.95;
      font-size: 1.04rem;
      text-rendering: optimizeLegibility;
    }

    .markdown-body p,
    .markdown-body li,
    .markdown-body dd,
    .markdown-body td,
    .markdown-body th {
      color: rgba(244, 247, 251, 0.94);
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      margin-top: 1.7em;
      margin-bottom: 0.72em;
      line-height: 1.22;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    .markdown-body h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    .markdown-body h2 {
      padding-bottom: 0.4em;
      border-bottom: 1px solid rgba(148, 196, 255, 0.14);
      font-size: clamp(1.58rem, 3vw, 2.05rem);
    }

    .markdown-body h3 {
      font-size: clamp(1.28rem, 2.4vw, 1.58rem);
    }

    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      color: #d9ebff;
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote {
      margin: 0 0 1.1em;
    }

    .markdown-body a {
      color: var(--accent-strong);
      text-decoration-color: rgba(184, 255, 246, 0.4);
      text-underline-offset: 0.18em;
    }

    .markdown-body a:hover {
      color: #ffffff;
      text-decoration-color: rgba(255, 255, 255, 0.78);
    }

    .markdown-body strong {
      color: #ffffff;
    }

    .markdown-body hr {
      height: 1px;
      margin: 2em 0;
      border: 0;
      background: linear-gradient(90deg, transparent, rgba(148, 196, 255, 0.3), transparent);
    }

    .markdown-body code {
      padding: 0.2em 0.48em;
      border-radius: 10px;
      border: 1px solid var(--code-inline-border);
      background: var(--code-inline-bg);
      color: #dff0ff;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .markdown-body .highlighter-rouge,
    .markdown-body div.highlight {
      position: relative;
      margin: 1.35em 0 1.55em;
    }

    .markdown-body div[class*="language-"].highlighter-rouge,
    .markdown-body div[class*="language-"].highlighter-rouge > .highlight,
    .markdown-body div[class*="language-"].highlighter-rouge > .highlight > pre.highlight,
    .markdown-body div[class*="language-"].highlighter-rouge > .highlight > pre,
    .markdown-body div[class*="language-"].highlighter-rouge code {
      background: linear-gradient(180deg, var(--code-bg-top), var(--code-bg)) !important;
      color: var(--code-text);
    }

    .markdown-body div[class*="language-"].highlighter-rouge > .highlight {
      border-radius: 20px;
      overflow: hidden;
    }

    .markdown-body div[class*="language-"].highlighter-rouge code {
      background: transparent !important;
    }

    .markdown-body .highlighter-rouge[class*="language-"]::before,
    .markdown-body div.highlight[class*="language-"]::before {
      position: absolute;
      top: 10px;
      right: 14px;
      z-index: 1;
      padding: 4px 10px;
      border: 1px solid rgba(140, 199, 255, 0.16);
      border-radius: 999px;
      background: rgba(8, 17, 31, 0.72);
      color: #b9d7f7;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .markdown-body .highlighter-rouge.language-java::before,
    .markdown-body div.highlight.language-java::before { content: "Java"; }
    .markdown-body .highlighter-rouge.language-javascript::before,
    .markdown-body div.highlight.language-javascript::before { content: "JavaScript"; }
    .markdown-body .highlighter-rouge.language-js::before,
    .markdown-body div.highlight.language-js::before { content: "JS"; }
    .markdown-body .highlighter-rouge.language-typescript::before,
    .markdown-body div.highlight.language-typescript::before { content: "TypeScript"; }
    .markdown-body .highlighter-rouge.language-ts::before,
    .markdown-body div.highlight.language-ts::before { content: "TS"; }
    .markdown-body .highlighter-rouge.language-html::before,
    .markdown-body div.highlight.language-html::before { content: "HTML"; }
    .markdown-body .highlighter-rouge.language-xml::before,
    .markdown-body div.highlight.language-xml::before { content: "XML"; }
    .markdown-body .highlighter-rouge.language-css::before,
    .markdown-body div.highlight.language-css::before { content: "CSS"; }
    .markdown-body .highlighter-rouge.language-scss::before,
    .markdown-body div.highlight.language-scss::before { content: "SCSS"; }
    .markdown-body .highlighter-rouge.language-bash::before,
    .markdown-body div.highlight.language-bash::before,
    .markdown-body .highlighter-rouge.language-shell::before,
    .markdown-body div.highlight.language-shell::before { content: "Shell"; }
    .markdown-body .highlighter-rouge.language-yaml::before,
    .markdown-body div.highlight.language-yaml::before { content: "YAML"; }
    .markdown-body .highlighter-rouge.language-json::before,
    .markdown-body div.highlight.language-json::before { content: "JSON"; }
    .markdown-body .highlighter-rouge.language-markdown::before,
    .markdown-body div.highlight.language-markdown::before { content: "Markdown"; }
    .markdown-body .highlighter-rouge.language-sql::before,
    .markdown-body div.highlight.language-sql::before { content: "SQL"; }
    .markdown-body .highlighter-rouge.language-python::before,
    .markdown-body div.highlight.language-python::before { content: "Python"; }
    .markdown-body .highlighter-rouge.language-go::before,
    .markdown-body div.highlight.language-go::before { content: "Go"; }
    .markdown-body .highlighter-rouge.language-ruby::before,
    .markdown-body div.highlight.language-ruby::before { content: "Ruby"; }
    .markdown-body .highlighter-rouge.language-kotlin::before,
    .markdown-body div.highlight.language-kotlin::before { content: "Kotlin"; }
    .markdown-body .highlighter-rouge.language-swift::before,
    .markdown-body div.highlight.language-swift::before { content: "Swift"; }
    .markdown-body .highlighter-rouge.language-c::before,
    .markdown-body div.highlight.language-c::before { content: "C"; }
    .markdown-body .highlighter-rouge.language-cpp::before,
    .markdown-body div.highlight.language-cpp::before,
    .markdown-body .highlighter-rouge.language-cxx::before,
    .markdown-body div.highlight.language-cxx::before { content: "C++"; }

    .markdown-body pre,
    .markdown-body .highlight pre,
    .markdown-body .rouge-table pre,
    .markdown-body figure.highlight pre {
      overflow: auto;
      padding: 24px 22px 20px;
      border-radius: 20px;
      background: linear-gradient(180deg, var(--code-bg-top), var(--code-bg)) !important;
      border: 1px solid var(--code-border);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.02),
        inset 0 0 0 1px rgba(3, 8, 16, 0.18);
      color: var(--code-text);
      line-height: 1.75;
      font-size: 0.95rem;
      tab-size: 2;
    }

<body>
  <canvas id="scene" aria-hidden="true"></canvas>
  <div class="noise" aria-hidden="true"></div>
  <div class="app-shell">
    {% include profile-card.html %}
    <main class="content-shell">
      <div class="content-shell__inner">
        {{ content }}
      </div>
    </main>
  </div>
  {% include particle-script.html %}
  <script>
    (function() {
      var root = document.documentElement;
      var toggle = document.querySelector("[data-theme-toggle]");
      if (!toggle) return;

      function sync(theme) {
        root.setAttribute("data-theme", theme);
        toggle.checked = theme === "dark";
      }

      var current = root.getAttribute("data-theme") || "dark";
      sync(current);

      toggle.addEventListener("change", function() {
        var next = toggle.checked ? "dark" : "light";
        try {
          localStorage.setItem("theme", next);
        } catch (e) {}
        sync(next);
      });
    })();
  </script>
