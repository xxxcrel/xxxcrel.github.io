<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines }}{% else %}{{ site.description }}{% endif %}">
  <style>
    :root {
      --bg-top: #08111f;
      --bg-bottom: #13283f;
      --panel-bg: rgba(10, 18, 32, 0.48);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text-main: #f4f7fb;
      --text-soft: rgba(244, 247, 251, 0.76);
      --text-faint: rgba(244, 247, 251, 0.56);
      --accent: #73e0ff;
      --accent-strong: #b8fff6;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.38);
      --shadow-hover: 0 24px 56px rgba(0, 0, 0, 0.32);
      --radius-xl: 30px;
      --radius-lg: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(115, 224, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(184, 255, 246, 0.12), transparent 24%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    a {
      color: inherit;
    }

    #scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 88%);
    }

    .app-shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      gap: 24px;
      width: min(1400px, calc(100vw - 32px));
      margin: 16px auto;
      min-height: calc(100svh - 32px);
    }

    .profile-panel {
      position: sticky;
      top: 16px;
      align-self: start;
      height: calc(100svh - 32px);
    }

    .profile-card,
    .content-shell,
    .content-card,
    .content-header,
    .meta-bar,
    .post-item,
    .pagination,
    .post-nav,
    .comments-panel {
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(145%);
      -webkit-backdrop-filter: blur(22px) saturate(145%);
    }

    .profile-card {
      position: relative;
      height: 100%;
      padding: 22px;
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .profile-card__glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(115, 224, 255, 0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(184, 255, 246, 0.08), transparent 18%);
      pointer-events: none;
    }

    .profile-card__inner {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      height: 100%;
    }

    .profile-badge,
    .section-badge,
    .tag-chip {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: var(--accent-strong);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .profile-avatar {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .profile-name {
      margin: 14px 0 0;
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .profile-subtitle,
    .profile-description,
    .content-subtitle,
    .content-intro,
    .post-excerpt {
      color: var(--text-soft);
      line-height: 1.75;
    }

    .profile-subtitle {
      margin: 10px 0 0;
      color: var(--accent-strong);
    }

    .profile-description,
    .content-subtitle,
    .content-intro {
      margin: 10px 0 0;
    }

    .profile-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .profile-action,
    .button-link,
    .pagination a,
    .pagination span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 11px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .profile-action:hover,
    .profile-action.is-active,
    .button-link:hover,
    .pagination a:hover,
    .pagination .is-current {
      transform: translateY(-2px);
      border-color: rgba(115, 224, 255, 0.4);
      background: rgba(115, 224, 255, 0.12);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.2);
    }

    .profile-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .info-pill {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      display: grid;
      gap: 8px;
    }

    .info-pill__label {
      color: var(--text-faint);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-pill__value {
      color: var(--text-main);
      font-size: 0.96rem;
      word-break: break-word;
    }

    .profile-footnote {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--text-faint);
      font-size: 0.92rem;
    }

    .profile-footnote a {
      text-decoration: none;
    }

    .content-shell {
      position: relative;
      padding: 18px;
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .content-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(115, 224, 255, 0.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(184, 255, 246, 0.08), transparent 20%);
      pointer-events: none;
    }

    .content-shell__inner {
      position: relative;
      display: grid;
      gap: 18px;
    }

    .content-header,
    .content-card,
    .pagination,
    .post-nav,
    .comments-panel {
      position: relative;
      padding: 22px;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .content-title {
      margin: 10px 0 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.04;
      letter-spacing: -0.05em;
    }

    .post-list {
      display: grid;
      gap: 18px;
    }

    .post-item {
      position: relative;
      padding: 22px;
      border-radius: 22px;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .post-item:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: var(--shadow-hover);
      border-color: rgba(115, 224, 255, 0.24);
      background: rgba(255, 255, 255, 0.06);
    }

    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      padding: 12px 14px;
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: none;
    }

    .meta-bar span,
    .meta-bar a {
      color: var(--text-faint);
      text-decoration: none;
      font-size: 0.92rem;
    }

    .post-item h2,
    .article-title {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2.05rem);
      line-height: 1.18;
      letter-spacing: -0.03em;
    }

    .post-item h2 a {
      text-decoration: none;
      color: var(--text-main);
    }

    .post-item h2 a:hover {
      color: var(--accent-strong);
    }

    .post-excerpt {
      margin: 14px 0 18px;
    }

    .post-item__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .pagination {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .pagination span {
      color: var(--text-faint);
    }

    .markdown-body {
      color: var(--text-main);
      line-height: 1.9;
      font-size: 1rem;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      margin-top: 1.7em;
      margin-bottom: 0.7em;
      line-height: 1.25;
      letter-spacing: -0.03em;
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote {
      margin: 0 0 1.1em;
    }

    .markdown-body a {
      color: var(--accent-strong);
    }

    .markdown-body code {
      padding: 0.18em 0.4em;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .markdown-body pre {
      overflow: auto;
      padding: 18px;
      border-radius: 18px;
      background: rgba(5, 10, 20, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .markdown-body pre code {
      padding: 0;
      background: transparent;
    }

    .markdown-body blockquote {
      padding: 12px 18px;
      border-left: 3px solid rgba(115, 224, 255, 0.55);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-soft);
      border-radius: 0 16px 16px 0;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 16px;
    }

    .markdown-body th,
    .markdown-body td {
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .markdown-body img {
      max-width: 100%;
      border-radius: 18px;
    }

    .posts-content,
    .listing {
      margin: 0;
      padding: 0;
    }

    .posts-list,
    .listing {
      list-style: none;
    }

    .posts-list-item,
    .listing-item {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .posts-list-item:last-child,
    .listing-item:last-child {
      border-bottom: 0;
    }

    .posts-list-meta {
      color: var(--text-faint);
      font-size: 0.92rem;
      min-width: 90px;
    }

    .posts-list-name,
    .listing-item a {
      text-decoration: none;
      color: var(--text-main);
    }

    .btn-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 22px;
    }

    .btn,
    .btn-outline {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
    }

    .post-nav {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .post-nav a,
    .post-nav__empty {
      display: block;
      padding: 16px;
      border-radius: 18px;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      min-height: 88px;
    }

    .post-nav__label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-faint);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media (max-width: 960px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .profile-panel {
        position: relative;
        top: 0;
        height: auto;
      }

      .profile-card__inner {
        height: auto;
      }
    }

    @media (max-width: 720px) {
      .app-shell {
        width: min(100vw - 20px, 100%);
        margin: 10px auto;
        gap: 12px;
      }

      .profile-card,
      .content-shell {
        padding: 14px;
        border-radius: var(--radius-lg);
      }

      .content-header,
      .content-card,
      .pagination,
      .post-nav,
      .comments-panel,
      .post-item {
        padding: 18px;
        border-radius: 20px;
      }

      .profile-info-grid,
      .post-nav {
        grid-template-columns: 1fr;
      }

      .post-item__footer,
      .profile-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .profile-action,
      .button-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-hidden="true"></canvas>
  <div class="noise" aria-hidden="true"></div>
  <div class="app-shell">
    {% include profile-card.html %}
    <main class="content-shell">
      <div class="content-shell__inner">
        {{ content }}
      </div>
    </main>
  </div>
  {% include particle-script.html %}
</body>
</html>
